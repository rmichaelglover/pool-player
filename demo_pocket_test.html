<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>pocket-test</title>
<style>
  body { margin: 0; background: #2e2e2e; color: #ddd; font: 13px sans-serif; }
  .wrap { display: flex; gap: 20px; padding: 16px; }
  .left { }
  .right { width: 320px; }
  canvas { background: #1b1b1b; display: block; }
  .ctrl { margin-bottom: 10px; }
  .ctrl label { display: inline-block; width: 130px; color: #aaa; }
  .ctrl input[type=range] { width: 140px; vertical-align: middle; }
  .num-in { width: 56px; background: #1b1b1b; color: #f4ecd8; border: 1px solid #444;
            padding: 2px 4px; font: 13px sans-serif; vertical-align: middle; }
  .num-in:focus { outline: none; border-color: #888; }
  .unit { color: #888; margin-left: 2px; }
  button { background: #4a7a9c; color: white; border: 0; padding: 8px 14px;
           font-size: 14px; cursor: pointer; margin-right: 6px; }
  button:hover { background: #5b8fb0; }
  button.reset { background: #9c4a4a; }
  button.reset:hover { background: #b05b5b; }
  .stats { margin-top: 14px; padding: 12px; background: #1b1b1b; border-radius: 4px; }
  .stats .row { margin-bottom: 4px; }
  .stats .num { color: #f4ecd8; font-weight: bold; font-size: 16px; }
  .pct { color: #88c088; }
  .pct.bad { color: #c08888; }
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <canvas id="cv" width="900" height="500"></canvas>
  </div>
  <div class="right">
    <div class="ctrl"><label>Cut angle</label>
      <input type="range" id="cut" min="0" max="85" step="1" value="0">
      <input type="number" id="cut_n" min="0" max="85" step="1" value="0" class="num-in">
      <span class="unit">°</span></div>
    <div class="ctrl"><label>Dc (cue→OB)</label>
      <input type="range" id="dc" min="5" max="60" step="1" value="10">
      <input type="number" id="dc_n" min="5" max="60" step="1" value="10" class="num-in">
      <span class="unit">″</span></div>
    <div class="ctrl"><label>Do (OB→pocket)</label>
      <input type="range" id="do" min="5" max="50" step="1" value="10">
      <input type="number" id="do_n" min="5" max="50" step="1" value="10" class="num-in">
      <span class="unit">″</span></div>
    <hr style="border-color:#444">
    <div class="ctrl"><label>Force</label>
      <input type="range" id="force" min="30" max="250" step="5" value="100">
      <input type="number" id="force_n" min="30" max="250" step="5" value="100" class="num-in">
      <span class="unit"></span></div>
    <div class="ctrl"><label>English (spin)</label>
      <input type="range" id="spin" min="-2" max="2" step="0.1" value="-0.5">
      <input type="number" id="spin_n" min="-2" max="2" step="0.1" value="-0.5" class="num-in">
      <span class="unit"></span></div>
    <hr style="border-color:#444">
    <div class="ctrl"><label>Aim noise</label>
      <input type="range" id="aim_noise" min="0" max="2" step="0.01" value="0.2">
      <input type="number" id="aim_noise_n" min="0" max="2" step="0.01" value="0.2" class="num-in">
      <span class="unit">°</span></div>
    <div class="ctrl"><label>Force noise</label>
      <input type="range" id="force_noise" min="0" max="10" step="0.5" value="2">
      <input type="number" id="force_noise_n" min="0" max="10" step="0.5" value="2" class="num-in">
      <span class="unit">%</span></div>
    <div class="ctrl"><label>Spin noise</label>
      <input type="range" id="spin_noise" min="0" max="0.2" step="0.01" value="0.02">
      <input type="number" id="spin_noise_n" min="0" max="0.2" step="0.01" value="0.02" class="num-in">
      <span class="unit"></span></div>
    <hr style="border-color:#444">
    <div class="ctrl"><label>Shots / press</label>
      <input type="range" id="n_shots" min="1" max="200" step="1" value="20">
      <input type="number" id="n_shots_n" min="1" max="200" step="1" value="20" class="num-in">
      <span class="unit"></span></div>
    <div style="margin-top:14px">
      <button id="shoot">Shoot</button>
      <button id="reset" class="reset">Reset</button>
    </div>
    <div class="stats">
      <div class="row">Trials: <span class="num" id="s_total">0</span></div>
      <div class="row">OB pocketed: <span class="num" id="s_pocketed">0</span>
        <span class="pct" id="s_pct_pocket"></span></div>
      <div class="row">Made (OB in, no scratch): <span class="num" id="s_made">0</span>
        <span class="pct" id="s_pct_made"></span></div>
      <div class="row">Cue scratched: <span class="num" id="s_scratched">0</span>
        <span class="pct bad" id="s_pct_scr"></span></div>
    </div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// Coordinate transform: table 100×50 with slate overhang on all sides → fit in 900×500 canvas.
const SCALE = 8.0;
const OX = 50;
const OY = 50;
const tx = (x) => OX + x * SCALE;
const ty = (y) => OY + y * SCALE;
const BR = 1.125 * SCALE;

let geo = null;
const stats = { total: 0, pocketed: 0, scratched: 0, made: 0 };
let lastTraj = null;
let animFrame = 0;

function $(id) { return document.getElementById(id); }
function val(id) { return parseFloat($(id).value); }

function drawTable() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  // Slate
  ctx.fillStyle = '#bdbdbd';
  ctx.fillRect(tx(-3.5), ty(-3.5), 107 * SCALE, 57 * SCALE);
  // Playing surface
  ctx.fillStyle = '#1b6b3a';
  ctx.fillRect(tx(0), ty(0), 100 * SCALE, 50 * SCALE);
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 2;
  ctx.strokeRect(tx(0), ty(0), 100 * SCALE, 50 * SCALE);
  // Pocket capture circles (faint)
  const pockets = [
    [-3.5, -3.5, 6.21], [50, -12.625, 12.375], [103.5, -3.5, 6.21],
    [-3.5, 53.5, 6.21], [50, 62.625, 12.375], [103.5, 53.5, 6.21],
  ];
  ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
  for (const [px, py, pr] of pockets) {
    ctx.beginPath();
    ctx.arc(tx(px), ty(py), pr * SCALE, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawShot() {
  if (!geo) return;
  // Aim line (cue → ghost ball, extended)
  const c = geo.cue, g = geo.gb, ob = geo.ob;
  const ext = [c[0] + (g[0] - c[0]) * 1.5, c[1] + (g[1] - c[1]) * 1.5];
  ctx.strokeStyle = '#e0c060';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(tx(c[0]), ty(c[1]));
  ctx.lineTo(tx(ext[0]), ty(ext[1]));
  ctx.stroke();
  // Pocket line (OB → pocket)
  ctx.strokeStyle = '#d05050';
  ctx.beginPath();
  ctx.moveTo(tx(ob[0]), ty(ob[1]));
  ctx.lineTo(tx(geo.pocket_aim[0]), ty(geo.pocket_aim[1]));
  ctx.stroke();
  ctx.setLineDash([]);
  // Ghost ball
  ctx.strokeStyle = '#e0c060';
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.arc(tx(g[0]), ty(g[1]), BR, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawBalls(cuePos, obPos) {
  // Object ball (orange)
  ctx.fillStyle = '#ffaa44';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(tx(obPos[0]), ty(obPos[1]), BR, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // Cue ball (white)
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(tx(cuePos[0]), ty(cuePos[1]), BR, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
}

function render() {
  drawTable();
  if (geo) {
    drawShot();
    let cuePos = geo.cue, obPos = geo.ob;
    if (lastTraj && animFrame > 0 && animFrame < lastTraj.length) {
      cuePos = lastTraj[animFrame][0];
      obPos = lastTraj[animFrame][1];
    } else if (lastTraj && animFrame >= lastTraj.length) {
      const last = lastTraj[lastTraj.length - 1];
      cuePos = last[0]; obPos = last[1];
    }
    drawBalls(cuePos, obPos);
  }
}

function animate() {
  if (!lastTraj) return;
  animFrame++;
  if (animFrame >= lastTraj.length + 10) {
    return; // hold final frame
  }
  render();
  requestAnimationFrame(animate);
}

async function refreshSetup() {
  const url = `/setup?cut=${val('cut')}&dc=${val('dc')}&do=${val('do')}`;
  const r = await fetch(url);
  geo = await r.json();
  if (geo.error) { geo = null; }
  lastTraj = null;
  animFrame = 0;
  render();
}

function updateStats() {
  $('s_total').textContent = stats.total;
  $('s_pocketed').textContent = stats.pocketed;
  $('s_made').textContent = stats.made;
  $('s_scratched').textContent = stats.scratched;
  if (stats.total > 0) {
    $('s_pct_pocket').textContent = '(' + (100 * stats.pocketed / stats.total).toFixed(1) + '%)';
    $('s_pct_made').textContent = '(' + (100 * stats.made / stats.total).toFixed(1) + '%)';
    $('s_pct_scr').textContent = '(' + (100 * stats.scratched / stats.total).toFixed(1) + '%)';
  } else {
    $('s_pct_pocket').textContent = '';
    $('s_pct_made').textContent = '';
    $('s_pct_scr').textContent = '';
  }
}

async function shoot() {
  if (!geo) { await refreshSetup(); }
  if (!geo) return;
  const params = new URLSearchParams({
    cut: val('cut'), dc: val('dc'), do: val('do'),
    force: val('force'), spin: val('spin'),
    aim_noise: val('aim_noise'),
    force_noise: val('force_noise') / 100,   // % to fraction
    spin_noise: val('spin_noise'),
    n: parseInt(val('n_shots')),
  });
  $('shoot').disabled = true;
  const r = await fetch('/shoot?' + params).then(r => r.json());
  $('shoot').disabled = false;
  if (r.error) { alert(r.error); return; }
  stats.total += r.n;
  stats.pocketed += r.n_pocketed;
  stats.made += r.n_made;
  stats.scratched += r.n_scratched;
  updateStats();
  // Animate the last trial.
  lastTraj = r.trajectory;
  animFrame = 0;
  if (lastTraj) animate();
}

function resetStats() {
  stats.total = 0; stats.pocketed = 0; stats.scratched = 0; stats.made = 0;
  updateStats();
  // Also clear any in-flight animation and redraw balls at starting positions.
  lastTraj = null;
  animFrame = 0;
  render();
}

function bindSlider(id) {
  const sl = $(id), nm = $(id + '_n');
  // Slider drag → mirror to number box.
  sl.addEventListener('input', () => { nm.value = sl.value; });
  // Typing → mirror back to slider, clamping to range. Fire `change` on the
  // slider so downstream listeners (refreshSetup etc.) see it.
  const fromNumber = () => {
    let v = parseFloat(nm.value);
    if (isNaN(v)) v = parseFloat(sl.value);
    v = Math.max(parseFloat(sl.min), Math.min(parseFloat(sl.max), v));
    sl.value = v;
    nm.value = v;
    sl.dispatchEvent(new Event('input'));
    sl.dispatchEvent(new Event('change'));
  };
  nm.addEventListener('change', fromNumber);
}

['cut','dc','do','force','spin','aim_noise','force_noise','spin_noise','n_shots']
  .forEach(bindSlider);

['cut', 'dc', 'do'].forEach(id =>
  $(id).addEventListener('change', refreshSetup));
$('shoot').addEventListener('click', shoot);
$('reset').addEventListener('click', resetStats);

refreshSetup();
updateStats();
</script>
</body>
</html>
