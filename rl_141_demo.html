<div id="playerBar">

<script>
const TL=100,TW=50,R=1.125,S=8,RW=5,OX=RW*S,OY=RW*S;
const POCKETS=[[0,0],[TL/2,0],[TL,0],[0,TW],[TL/2,TW],[TL,TW]];
const POCKET_R=[2.5,2.75,2.5,2.5,2.75,2.5];
const _mo=2.5*0.45,_smo=2.75*0.15;
const PA=[[_mo,_mo],[TL/2,_smo],[TL-_mo,_mo],[_mo,TW-_mo],[TL/2,TW-_smo],[TL-_mo,TW-_mo]];
const IDEAL=[[-1,-1],[0,-1],[1,-1],[-1,1],[0,1],[1,1]];
const MAX_A=[65,50,65,65,50,65].map(d=>d*Math.PI/180);
const SPIN_NAMES=['Stop','Follow','Draw'];
const BALL_COLORS=['#FFD700','#0000CC','#CC0000','#660099','#FF6600',
                   '#007700','#800000','#111','#FFD700','#0000CC',
                   '#CC0000','#660099','#FF6600','#007700','#800000'];
const MU_ROLL=0.008,G_=386.09,CUSH_R=0.90,BALL_R=0.96,DT_=1/300,VT=0.15;
const TARGET_SCORE=25;

let aimModel=null;
let stratModel=null;
let cueBall={x:25,y:25};
let balls=[];  // {id, x, y}
let pocketed=new Set();
let currentPlan=null;
let simulating=false, simBallState={}, simPocketed=new Set();
let simHitBall=false, simHitRail=false;
let simRailBalls=new Set(); // tracks which ball IDs hit a cushion after contact

// Game state
let scores=[0,0], currentPlayer=0, consecutiveFouls=[0,0], runLength=0;
let turnPocketed=[], foulMsg='', gameOver=false;
let targetReached=false, winningPlayer=-1, bestRun=0;
let isOpeningBreak=true; // first shot of the game is an opening break

// Load models
Promise.all([
  fetch('js/aim_model.json').then(r=>r.json()),
  fetch('strategy_weights.json').then(r=>r.json()).catch(()=>null)
]).then(([aim, strat])=>{
  aimModel=aim;
  stratModel=strat;
  const mode=strat?'PPO strategy':'geometric greedy';
  document.getElementById('status').textContent=`Ready (${mode}). Click "New Game".`;
  newGame();
});

function tx(x){return x*S+OX;} function ty(y){return y*S+OY;}

function nnForward(model,input){
  let x=input;
  for(let i=0;i<model.layers.length;i+=2){
    const W=model.layers[i],b=model.layers[i+1],rows=W.shape[0],cols=W.shape[1];
    const out=new Array(rows).fill(0);
    for(let r=0;r<rows;r++){let s=b.data[r];for(let c=0;c<cols;c++)s+=W.data[r][c]*x[c];
      out[r]=i<model.layers.length-2?Math.max(0,s):s;}
    x=out;}
  const norm=Math.sqrt(x[0]*x[0]+x[1]*x[1])||0.001;
  return Math.atan2(x[1]/norm,x[0]/norm);
}

function getAimAngle(cx,cy,bx,by,px,py){
  return nnForward(aimModel,[cx/TL,cy/TW,bx/TL,by/TW,px/TL,py/TW]);
}

function isPathClear(sx,sy,ex,ey,excludeIds){
  const dx=ex-sx,dy=ey-sy,len=Math.sqrt(dx*dx+dy*dy);
  if(len<0.1)return true;
  const nx=dx/len,ny=dy/len;
  for(const b of balls){
    if(pocketed.has(b.id)||excludeIds.includes(b.id))continue;
    const bx=b.x-sx,by=b.y-sy,proj=bx*nx+by*ny;
    if(proj<0){
      // Past start: check distance to start point
      if(bx*bx+by*by<4*R*R)return false;
    }else if(proj>len){
      // Past end: check distance to end point
      const ex2=bx-dx,ey2=by-dy;
      if(ex2*ex2+ey2*ey2<4*R*R)return false;
    }else{
      // Along segment: check perpendicular distance
      if(Math.abs(-bx*ny+by*nx)<2*R)return false;
    }
  }
  return true;
}

function pocketApproachOk(bx,by,pidx){
  const px=PA[pidx][0],py=PA[pidx][1],dx=px-bx,dy=py-by,d=Math.sqrt(dx*dx+dy*dy);
  if(d<0.01)return true;
  const il=Math.sqrt(IDEAL[pidx][0]**2+IDEAL[pidx][1]**2);
  const dot=(dx/d)*IDEAL[pidx][0]/il+(dy/d)*IDEAL[pidx][1]/il;
  const angle=Math.acos(Math.max(-1,Math.min(1,dot)));
  const bonus=Math.max(0,(20-d)/20)*(20*Math.PI/180);
  return angle<(MAX_A[pidx]+bonus);
}

function bestPocketForBall(bx,by,bid){
  let bestCA=999,bestP=null;
  for(let p=0;p<6;p++){
    if(!pocketApproachOk(bx,by,p))continue;
    const px=PA[p][0],py=PA[p][1],tpx=px-bx,tpy=py-by,tpd=Math.sqrt(tpx*tpx+tpy*tpy);
    if(tpd<0.1)continue;
    const tnx=tpx/tpd,tny=tpy/tpd;
    const gx=bx-tnx*2*R,gy=by-tny*2*R;
    const cgd=Math.sqrt((gx-cueBall.x)**2+(gy-cueBall.y)**2);
    if(cgd<0.1)continue;
    const cdot=((gx-cueBall.x)/cgd)*tnx+((gy-cueBall.y)/cgd)*tny;
    const ca=Math.acos(Math.max(-1,Math.min(1,cdot)))*180/Math.PI;
    if(ca>75)continue;
    if(!isPathClear(cueBall.x,cueBall.y,gx,gy,[bid]))continue;
    if(!isPathClear(bx,by,px,py,[bid]))continue;
    const cueToDist=Math.sqrt((gx-cueBall.x)**2+(gy-cueBall.y)**2);
    const ballToPocket=Math.sqrt((px-bx)**2+(py-by)**2);
    const difficulty=ca/75+(cueToDist+ballToPocket)/(TL*1.5);
    if(difficulty<bestCA){bestCA=difficulty;bestP={p,gx,gy,ca};}
  }
  return bestP;
}

function estimateCuePosition(ghost,aimDir,pocketDir,spinType){
  const dists=[3,20,12];let dx,dy;
  if(spinType===0){dx=-pocketDir[1]*dists[0];dy=pocketDir[0]*dists[0];}
  else if(spinType===1){dx=pocketDir[0]*dists[1];dy=pocketDir[1]*dists[1];}
  else{dx=-aimDir[0]*dists[2];dy=-aimDir[1]*dists[2];}
  return[Math.max(R,Math.min(TL-R,ghost.x+dx)),Math.max(R,Math.min(TW-R,ghost.y+dy))];
}

// ── Strategy network helpers ──────────────────────────────────────────────
function strategyForward(obs){
  const W0=stratModel.trunk_0_weight,B0=stratModel.trunk_0_bias;
  const W2=stratModel.trunk_2_weight,B2=stratModel.trunk_2_bias;
  const WS=stratModel.shot_weight,BS=stratModel.shot_bias;
  const WSPIN=stratModel.spin_weight,BSPIN=stratModel.spin_bias;
  const WSP=stratModel.speed_weight,BSP=stratModel.speed_bias;
  const inDim=stratModel.input_dim||40;
  // Trunk Layer 1: Linear(inDim,128)+ReLU
  const h=new Array(128);
  for(let r=0;r<128;r++){let s=B0[r];for(let c=0;c<inDim;c++)s+=W0[r][c]*obs[c];h[r]=Math.max(0,s);}
  // Trunk Layer 2: Linear(128,64)+ReLU
  const h2=new Array(64);
  for(let r=0;r<64;r++){let s=B2[r];for(let c=0;c<128;c++)s+=W2[r][c]*h[c];h2[r]=Math.max(0,s);}
  // Shot head: Linear(64,4)
  const shotLogits=new Array(5);
  for(let r=0;r<5;r++){let s=BS[r];for(let c=0;c<64;c++)s+=WS[r][c]*h2[c];shotLogits[r]=s;}
  // Spin head: Linear(64,3)
  const spinLogits=new Array(3);
  for(let r=0;r<3;r++){let s=BSPIN[r];for(let c=0;c<64;c++)s+=WSPIN[r][c]*h2[c];spinLogits[r]=s;}
  // Speed head: Linear(64,3)
  const speedLogits=new Array(3);
  for(let r=0;r<3;r++){let s=BSP[r];for(let c=0;c<64;c++)s+=WSP[r][c]*h2[c];speedLogits[r]=s;}
  return {shotLogits, spinLogits, speedLogits};
}
function clusterCount(bx,by,bid){
  let cnt=0;
  for(const b of balls){
    if(pocketed.has(b.id)||b.id===bid||b.id>15)continue;
    const d=Math.sqrt((b.x-bx)**2+(b.y-by)**2);
    if(d>0.1&&d<5*R)cnt++;}
  return cnt;
}
function buildCandidates(){
  const STRAT_NORM=10; // training used TARGET_SCORE=10
  const RACK_CX=80,RACK_CY=25;
  // Build raw list with geometric difficulty
  const raw=[];
  for(const b of balls){
    if(pocketed.has(b.id)||b.id>15)continue;
    const bp=bestPocketForBall(b.x,b.y,b.id);
    if(!bp)continue;
    const px=PA[bp.p][0],py=PA[bp.p][1];
    const dx=bp.gx-cueBall.x,dy=bp.gy-cueBall.y;
    const d=Math.sqrt(dx*dx+dy*dy); if(d<0.1)continue;
    const aimDir=[dx/d,dy/d];
    const tpx=px-b.x,tpy=py-b.y,tpd=Math.sqrt(tpx*tpx+tpy*tpy)||0.001;
    const pocketDir=[tpx/tpd,tpy/tpd];
    const diff=bp.ca/75+(d+tpd)/(TL*1.5);
    raw.push({bid:b.id,bx:b.x,by:b.y,pIdx:bp.p,ca:bp.ca,
              ghost:{x:bp.gx,y:bp.gy},pocketDir,aimDir,
              difficulty:diff,cueToBall:d,ballToPocket:tpd});
  }
  // Makeable shots + lookahead
  const makeable=raw.filter(c=>c.difficulty<=2.0);
  for(const c of makeable){
    let bestSpin=0,bestReach=-1,bestCueAfter=null,bestNextDiff=2.0;
    pocketed.add(c.bid); // exclude shot ball from path checks
    for(let spin=0;spin<3;spin++){
      const ca=estimateCuePosition(c.ghost,c.aimDir,c.pocketDir,spin);
      let reach=0,minND=2.0;
      const sv=[cueBall.x,cueBall.y]; cueBall.x=ca[0]; cueBall.y=ca[1];
      for(const b2 of balls){
        if(pocketed.has(b2.id)||b2.id>15)continue;
        const bp2=bestPocketForBall(b2.x,b2.y,b2.id);
        if(bp2){reach++;
          const cd2=Math.sqrt((bp2.gx-ca[0])**2+(bp2.gy-ca[1])**2);
          const px2=PA[bp2.p][0],py2=PA[bp2.p][1];
          const pd2=Math.sqrt((px2-b2.x)**2+(py2-b2.y)**2);
          const d2=bp2.ca/75+(cd2+pd2)/(TL*1.5);
          if(d2<minND)minND=d2;}
      }
      cueBall.x=sv[0]; cueBall.y=sv[1];
      if(reach>bestReach||(reach===bestReach&&minND<bestNextDiff)){
        bestReach=reach;bestSpin=spin;bestCueAfter=ca;bestNextDiff=minND;}
    }
    pocketed.delete(c.bid);
    c.bestSpin=bestSpin;c.cueAfter=bestCueAfter;c.reach=bestReach;
    c.nextDiff=bestNextDiff;c.cluster=clusterCount(c.bx,c.by,c.bid);
  }
  // Diversity-aware slot selection
  const cands=[],used=new Set();
  if(makeable.length>0){
    const safeSorted=[...makeable].sort((a,b)=>a.difficulty-b.difficulty);
    for(const c of safeSorted){if(!used.has(c.bid)){cands.push(c);used.add(c.bid);break;}}
    const brkSorted=[...makeable].sort((a,b)=>(b.cluster-a.cluster)||a.difficulty-b.difficulty);
    for(const c of brkSorted){if(!used.has(c.bid)){cands.push(c);used.add(c.bid);break;}}
    const posSorted=[...makeable].sort((a,b)=>(b.reach-a.reach)||a.difficulty-b.difficulty);
    for(const c of posSorted){if(!used.has(c.bid)){cands.push(c);used.add(c.bid);break;}}
    // Slot 3: key ball — near the rack but not inside it
    const RACK_XN=73,RACK_XX=84,RACK_YN=19,RACK_YX=31,RACK_CX2=80,RACK_CY2=25;
    const keyCands=[];
    for(const c of makeable){
      if(used.has(c.bid))continue;
      const bx=c.bx,by=c.by;
      if(bx>RACK_XN&&bx<RACK_XX&&by>RACK_YN&&by<RACK_YX)continue;
      const rd=Math.sqrt((bx-RACK_CX2)**2+(by-RACK_CY2)**2);
      if(rd<25)keyCands.push({rd,c});
    }
    if(keyCands.length>0){
      keyCands.sort((a,b)=>a.rd-b.rd);
      cands.push(keyCands[0].c);used.add(keyCands[0].c.bid);
    }
  }
  // Build 52-dim observation (4 global + 4 slots x 12 features)
  const obs=new Float32Array(52);
  obs[0]=cueBall.x/TL; obs[1]=cueBall.y/TW;
  obs[2]=Math.min(runLength,15)/15;
  const onTable=balls.filter(b=>!pocketed.has(b.id)&&b.id<=15).length;
  obs[3]=onTable/15;
  for(let sl=0;sl<4;sl++){
    const base=4+sl*12; if(sl>=cands.length)continue;
    const c=cands[sl];
    const rd=Math.sqrt((c.cueAfter[0]-RACK_CX)**2+(c.cueAfter[1]-RACK_CY)**2);
    obs[base]=c.bx/TL; obs[base+1]=c.by/TW;
    obs[base+2]=c.cueAfter[0]/TL; obs[base+3]=c.cueAfter[1]/TW;
    obs[base+4]=Math.min(c.difficulty,2)/2; obs[base+5]=c.cluster/15;
    obs[base+6]=Math.min(c.nextDiff,2)/2; obs[base+7]=c.reach/15;
    obs[base+8]=Math.min(rd,TL)/TL; obs[base+9]=c.cueToBall/TL;
    obs[base+10]=c.ballToPocket/TL; obs[base+11]=1;
  }
  return {cands,obs};
}

// ── Opening break (14.1 safety break) ─────────────────────────────────────
function planOpeningBreak(){
  foulMsg='';document.getElementById('foul').style.display='none';
  turnPocketed=[];
  // Place cue ball on head string (x=25), ~25% from one side rail
  const side=Math.random()>0.5?-1:1; // -1=near bottom, +1=near top
  cueBall.x=25; cueBall.y=side<0?TW*0.25:TW*0.75;
  console.log('Opening break: cue at',cueBall.x,cueBall.y,'side=',side,'TW=',TW);
  // Find the back corner ball on the same side as cue ball.
  // Back row of rack (x > 80), pick the ball closest to the near side rail.
  let target=null,bestDist=999;
  for(const b of balls){
    if(pocketed.has(b.id))continue;
    if(b.x<80)continue; // only consider back row of rack
    const distToSideRail=side<0?b.y:(TW-b.y); // distance to the near side rail
    if(distToSideRail<bestDist){bestDist=distToSideRail;target=b;}
  }
  if(!target){target=balls.find(b=>!pocketed.has(b.id));}
  // Aim to hit ~1/3 of the ball: offset aim point toward the outside
  // (away from rack center) so the cue ball clips it thinly.
  const dx=target.x-cueBall.x,dy=target.y-cueBall.y;
  const d=Math.sqrt(dx*dx+dy*dy)||0.001;
  // Perpendicular to aim line, pointing toward the near side rail
  const perpX=-dy/d,perpY=dx/d;
  // Offset the aim point by ~1.5R outward for a thin clip (~1/4 ball)
  const aimX=target.x+perpX*R*1.5*side;
  const aimY=target.y+perpY*R*1.5*side;
  const angle=Math.atan2(aimY-cueBall.y,aimX-cueBall.x);
  currentPlan={ballId:target.id,pocketIdx:0,spinType:2,ghost:{x:target.x,y:target.y},
    cutAngle:0,aimAngle:angle,isSafety:false,isOpeningBreak:true,speedLevel:2};
  document.getElementById('status').textContent=
    `${pname()}: Opening break -> clip Ball #${target.id}. Click "Shoot".`;
}

// ── Shot planning (strategy network or geometric fallback) ────────────────
function planShot(){
  if(!aimModel||gameOver)return;
  if(isOpeningBreak){planOpeningBreak();return;}
  foulMsg='';document.getElementById('foul').style.display='none';
  turnPocketed=[];
  if(pocketed.has(0)){cueBall.x=25;cueBall.y=25;pocketed.delete(0);}

  let bestChoice=null;

  if(stratModel){
    // PPO strategy network
    const{cands,obs}=buildCandidates();
    if(cands.length>0){
      const{shotLogits,spinLogits,speedLogits}=strategyForward(obs);
      // Shot probabilities (masked)
      const mask=[];for(let i=0;i<5;i++)mask.push(i<cands.length||i===4?1:0);
      let mx=-Infinity;for(let i=0;i<5;i++)if(mask[i])mx=Math.max(mx,shotLogits[i]);
      let se=0;const pr=[];
      for(let i=0;i<5;i++){pr[i]=mask[i]?Math.exp(shotLogits[i]-mx):0;se+=pr[i];}
      for(let i=0;i<5;i++)pr[i]/=se;
      // Spin probabilities (softmax, no mask)
      const SPIN_NAMES_S=['stop','follow','draw'];
      let spinMx=Math.max(...spinLogits);
      let spinSe=0;const spinPr=[];
      for(let i=0;i<3;i++){spinPr[i]=Math.exp(spinLogits[i]-spinMx);spinSe+=spinPr[i];}
      for(let i=0;i<3;i++)spinPr[i]/=spinSe;
      // Speed probabilities (softmax, no mask)
      const SPEED_NAMES_S=['soft','med','hard'];
      let smx=Math.max(...speedLogits);
      let sse=0;const spr=[];
      for(let i=0;i<3;i++){spr[i]=Math.exp(speedLogits[i]-smx);sse+=spr[i];}
      for(let i=0;i<3;i++)spr[i]/=sse;
      // Sample shot
      let rnd=Math.random(),cum=0,ai=4;
      for(let i=0;i<5;i++){cum+=pr[i];if(rnd<cum){ai=i;break;}}
      // Sample spin
      rnd=Math.random();cum=0;let spinIdx=0;
      for(let i=0;i<3;i++){cum+=spinPr[i];if(rnd<cum){spinIdx=i;break;}}
      // Sample speed
      rnd=Math.random();cum=0;let spi=1;
      for(let i=0;i<3;i++){cum+=spr[i];if(rnd<cum){spi=i;break;}}
      const slotNames=['safe','breaker','position','keyball','pass'];
      if(ai<cands.length){
        const c=cands[ai];
        bestChoice={ballId:c.bid,pocketIdx:c.pIdx,spinType:spinIdx,
          ghost:c.ghost,cutAngle:c.ca,speedLevel:spi};
        const b=balls.find(b2=>b2.id===c.bid);
        bestChoice.aimAngle=getAimAngle(cueBall.x,cueBall.y,b.x,b.y,PA[c.pIdx][0],PA[c.pIdx][1]);
        bestChoice.isSafety=false;
        currentPlan=bestChoice;
        const pn=['TL','TS','TR','BL','BS','BR'][c.pIdx];
        document.getElementById('status').textContent=
          `${pname()}: Ball #${c.bid} -> ${pn} [${slotNames[ai]}] `+
          `(${SPIN_NAMES_S[spinIdx]} ${(spinPr[spinIdx]*100).toFixed(0)}%, ${SPEED_NAMES_S[spi]} ${(spr[spi]*100).toFixed(0)}%, cut ${c.ca.toFixed(0)}deg). Click "Shoot".`;
        return;
      }
      // else pass/safety selected
    }
  } else {
    // Geometric greedy fallback (original planShot logic)
    let bestDiff=999;
    for(const b of balls){
      if(pocketed.has(b.id)||b.id>15)continue;
      const bp=bestPocketForBall(b.x,b.y,b.id);
      if(!bp)continue;
      const px=PA[bp.p][0],py=PA[bp.p][1];
      const tpx=px-b.x,tpy=py-b.y,tpd=Math.sqrt(tpx*tpx+tpy*tpy)||0.001;
      const pocketDir=[tpx/tpd,tpy/tpd];
      const aimDx=bp.gx-cueBall.x,aimDy=bp.gy-cueBall.y;
      const aimD=Math.sqrt(aimDx*aimDx+aimDy*aimDy)||0.001;
      const aimDir=[aimDx/aimD,aimDy/aimD];
      const cueToDist=Math.sqrt((bp.gx-cueBall.x)**2+(bp.gy-cueBall.y)**2);
      const ballToPocket=Math.sqrt((px-b.x)**2+(py-b.y)**2);
      const baseDiff=bp.ca/75+(cueToDist+ballToPocket)/(TL*1.5);
      for(let s=0;s<3;s++){
        const cueFinal=estimateCuePosition({x:bp.gx,y:bp.gy},aimDir,pocketDir,s);
        let bestFollowUp=999;
        for(const b2 of balls){
          if(pocketed.has(b2.id)||b2.id===b.id||b2.id>15)continue;
          const saved=[cueBall.x,cueBall.y];cueBall.x=cueFinal[0];cueBall.y=cueFinal[1];
          const bp2=bestPocketForBall(b2.x,b2.y,b2.id);
          cueBall.x=saved[0];cueBall.y=saved[1];
          if(bp2){const cd2=Math.sqrt((bp2.gx-cueFinal[0])**2+(bp2.gy-cueFinal[1])**2);
            const px2=PA[bp2.p][0],py2=PA[bp2.p][1];
            const pd2=Math.sqrt((px2-b2.x)**2+(py2-b2.y)**2);
            bestFollowUp=Math.min(bestFollowUp,bp2.ca/75+(cd2+pd2)/(TL*1.5));}
        }
        const combined=baseDiff+bestFollowUp*0.3;
        if(combined<bestDiff){bestDiff=combined;
          bestChoice={ballId:b.id,pocketIdx:bp.p,spinType:s,ghost:{x:bp.gx,y:bp.gy},cutAngle:bp.ca};}
      }
    }
    if(bestChoice){
      const b=balls.find(b2=>b2.id===bestChoice.ballId);
      bestChoice.aimAngle=getAimAngle(cueBall.x,cueBall.y,b.x,b.y,PA[bestChoice.pocketIdx][0],PA[bestChoice.pocketIdx][1]);
      bestChoice.isSafety=false;
      currentPlan=bestChoice;
      const pn=['TL','TS','TR','BL','BS','BR'][bestChoice.pocketIdx];
      document.getElementById('status').textContent=
        `${pname()}: Ball #${bestChoice.ballId} -> ${pn} (${SPIN_NAMES[bestChoice.spinType]}, cut ${bestChoice.cutAngle.toFixed(0)}deg). Click "Shoot".`;
      return;
    }
  }
  // No valid shot — play a strategic safety.
  // For each ball: compute where a thin clip sends the cue ball,
  // then score by how hard the opponent's best shot would be from there.
  const onTable=balls.filter(b=>!pocketed.has(b.id)&&b.id<=15);
  let bestSafety=null, bestOppDiff=-999;

  for(const b of onTable){
    const dx=b.x-cueBall.x, dy=b.y-cueBall.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<2)continue; // too close to clip thinly

    // Thin hit: cue ball deflects roughly perpendicular to aim line.
    // Try both perpendicular directions and pick the one that's worse for opponent.
    const nx=dx/d, ny=dy/d; // aim direction
    for(const side of [1,-1]){
      const perpX=-ny*side, perpY=nx*side; // perpendicular direction

      // Project cue ball from contact point along perpendicular until it hits a rail.
      // Contact point is near the ball (thin hit = cue barely touches it)
      const cx=b.x-nx*2.5*R, cy=b.y-ny*2.5*R; // contact area (thin = further from center)

      // Trace cue ball along perpendicular to nearest rail
      let cueEndX=cx, cueEndY=cy;
      // Travel ~30 inches along perpendicular (medium speed thin hit)
      cueEndX+=perpX*30; cueEndY+=perpY*30;
      // Clamp to table
      cueEndX=Math.max(R*2,Math.min(TL-R*2,cueEndX));
      cueEndY=Math.max(R*2,Math.min(TW-R*2,cueEndY));

      // Score: how hard is opponent's best shot from this cue position?
      // Temporarily move cue ball to evaluate
      const savedCue=[cueBall.x,cueBall.y];
      cueBall.x=cueEndX; cueBall.y=cueEndY;
      let oppBestDiff=999;
      for(const b2 of onTable){
        const bp=bestPocketForBall(b2.x,b2.y,b2.id);
        if(bp){
          const cd=Math.sqrt((bp.gx-cueEndX)**2+(bp.gy-cueEndY)**2);
          const pd=Math.sqrt((PA[bp.p][0]-b2.x)**2+(PA[bp.p][1]-b2.y)**2);
          const diff=bp.ca/75+(cd+pd)/(TL*1.5);
          if(diff<oppBestDiff) oppBestDiff=diff;
        }
      }
      cueBall.x=savedCue[0]; cueBall.y=savedCue[1];

      // Higher oppBestDiff = harder for opponent = better safety
      if(oppBestDiff>bestOppDiff){
        bestOppDiff=oppBestDiff;
        // Compute aim angle: thin clip on chosen side
        const aimAngle=Math.atan2(dy,dx)+side*0.35; // ~20 degree offset for thin hit
        bestSafety={target:b, angle:aimAngle, oppDiff:oppBestDiff,
                    cueEnd:[cueEndX,cueEndY]};
      }
    }
  }

  if(bestSafety){
    const b=bestSafety.target;
    const d=Math.sqrt((b.x-cueBall.x)**2+(b.y-cueBall.y)**2);
    // Speed: enough to reach the ball and travel to the rail after
    // Minimum speed to travel distance d + 30 with friction: v = sqrt(2*mu*g*(d+30))
    const minSpeed=Math.sqrt(2*0.008*386*(d+30));
    const safetySpeed=minSpeed<20?0:(minSpeed<35?1:2); // soft/medium/hard
    document.getElementById('status').textContent=
      `${pname()}: Safety -> clip Ball #${b.id} (opp diff=${bestOppDiff.toFixed(1)}). Click "Shoot".`;
    currentPlan={ballId:b.id,pocketIdx:0,spinType:0,
      ghost:{x:b.x,y:b.y},cutAngle:0,aimAngle:bestSafety.angle,
      isSafety:true,speedLevel:safetySpeed};
  } else if(onTable.length>0){
    // Absolute fallback: hit nearest ball medium speed
    const nearest=onTable.sort((a,b2)=>
      Math.sqrt((a.x-cueBall.x)**2+(a.y-cueBall.y)**2)-
      Math.sqrt((b2.x-cueBall.x)**2+(b2.y-cueBall.y)**2))[0];
    const angle=Math.atan2(nearest.y-cueBall.y,nearest.x-cueBall.x);
    currentPlan={ballId:nearest.id,pocketIdx:0,spinType:0,
      ghost:{x:nearest.x,y:nearest.y},cutAngle:0,aimAngle:angle,
      isSafety:true,speedLevel:1};
    document.getElementById('status').textContent=
      `${pname()}: Safety -> Ball #${nearest.id}. Click "Shoot".`;
  }
}

function pname(){return `Player ${currentPlayer+1}`;}

let simSpinType=0, simAimDir=[1,0], simSpinApplied=false;

function shoot(){
  if(simulating||!currentPlan||gameOver)return;
  const SPEED_FORCE=[15,30,50];
  const force=currentPlan.isOpeningBreak?50:(currentPlan.isSafety?(SPEED_FORCE[currentPlan.speedLevel||0]):(SPEED_FORCE[currentPlan.speedLevel||1]));
  const dx=Math.cos(currentPlan.aimAngle),dy=Math.sin(currentPlan.aimAngle);
  simBallState={};simPocketed=new Set();simHitBall=false;simHitRail=false;simRailBalls=new Set();
  simSpinType=currentPlan.spinType||0;
  simAimDir=[dx,dy];
  simSpinApplied=false;
  simBallState[0]={x:cueBall.x,y:cueBall.y,vx:force*dx,vy:force*dy,pocketed:false};
  for(const b of balls){if(!pocketed.has(b.id))simBallState[b.id]={x:b.x,y:b.y,vx:0,vy:0,pocketed:false};}
  simulating=true;
}

function simStep(){
  if(!simBallState||Object.keys(simBallState).length===0)return;
  const ids=Object.keys(simBallState).map(Number);
  for(const id of ids){const b=simBallState[id];if(b.pocketed)continue;applyF(b);b.x+=b.vx*DT_;b.y+=b.vy*DT_;}
  // Multi-pass collision resolution: lets impulses propagate through
  // tight racks in a single time step instead of losing energy across many steps.
  for(let pass=0;pass<5;pass++){
    let anyCol=false;
    for(let i=0;i<ids.length;i++){const b1=simBallState[ids[i]];if(b1.pocketed)continue;
      for(let j=i+1;j<ids.length;j++){const b2=simBallState[ids[j]];if(b2.pocketed)continue;
        if(b1.vx*b1.vx+b1.vy*b1.vy<0.001&&b2.vx*b2.vx+b2.vy*b2.vy<0.001)continue;
        const dx=b2.x-b1.x,dy=b2.y-b1.y,d2=dx*dx+dy*dy,md=2*R;
        if(d2<md*md&&d2>0.0001){const d=Math.sqrt(d2),ol=md-d;
          const dvx=b1.vx-b2.vx,dvy=b1.vy-b2.vy,cs=(dvx*dx+dvy*dy)/d;
          const dt2=cs>0.01?ol/cs:0;
          const cx1=b1.x-b1.vx*dt2,cy1=b1.y-b1.vy*dt2,cx2=b2.x-b2.vx*dt2,cy2=b2.y-b2.vy*dt2;
          const cdx=cx2-cx1,cdy=cy2-cy1,cd=Math.sqrt(cdx*cdx+cdy*cdy)||0.001;
          const nx=cdx/cd,ny=cdy/cd;
          b1.x-=nx*ol/2;b1.y-=ny*ol/2;b2.x+=nx*ol/2;b2.y+=ny*ol/2;
          const dvn=(b1.vx-b2.vx)*nx+(b1.vy-b2.vy)*ny;
          if(dvn>0){
            anyCol=true;
            const isCueCol=(ids[i]===0||ids[j]===0);
            let preSpeed=0;
            if(isCueCol&&!simSpinApplied){
              const cb=simBallState[0];
              preSpeed=Math.sqrt(cb.vx*cb.vx+cb.vy*cb.vy);
            }
            const jj=(1+BALL_R)*dvn/2;b1.vx-=jj*nx;b1.vy-=jj*ny;b2.vx+=jj*nx;b2.vy+=jj*ny;
            if(isCueCol){
              simHitBall=true;
              if(!simSpinApplied){
                simSpinApplied=true;
                const cb=simBallState[0];
                const aimDot=cb.vx*simAimDir[0]+cb.vy*simAimDir[1];
                if(simSpinType===0){
                  cb.vx-=aimDot*simAimDir[0];cb.vy-=aimDot*simAimDir[1];
                  cb.vx*=0.5;cb.vy*=0.5;
                }else if(simSpinType===1){
                  cb.vx+=simAimDir[0]*preSpeed*0.18;cb.vy+=simAimDir[1]*preSpeed*0.18;
                }else if(simSpinType===2){
                  cb.vx-=simAimDir[0]*preSpeed*0.14;cb.vy-=simAimDir[1]*preSpeed*0.14;
                }
              }
            }
          }}}}
    if(!anyCol)break;
  }
  for(const id of ids){if(!simBallState[id].pocketed){simBallState[id]._trackId=id;cushTrack(simBallState[id]);}}
  for(const id of ids){const b=simBallState[id];if(b.pocketed)continue;
    for(let p=0;p<6;p++){const dx2=b.x-POCKETS[p][0],dy2=b.y-POCKETS[p][1];
      if(dx2*dx2+dy2*dy2<POCKET_R[p]**2){b.pocketed=true;b.vx=0;b.vy=0;simPocketed.add(id);break;}}}
  let allStopped=true;
  for(const id of ids){const b=simBallState[id];if(!b.pocketed&&Math.sqrt(b.vx*b.vx+b.vy*b.vy)>VT){allStopped=false;break;}}
  if(allStopped){simulating=false;onShotComplete();}
}

function onShotComplete(){
  // Update positions
  cueBall.x=simBallState[0].x;cueBall.y=simBallState[0].y;
  for(const b of balls){if(b.id in simBallState&&!simBallState[b.id].pocketed){b.x=simBallState[b.id].x;b.y=simBallState[b.id].y;}}

  const cueScratch=simPocketed.has(0);
  const objPocketed=[];
  for(const pid of simPocketed){if(pid!==0){pocketed.add(pid);objPocketed.push(pid);}}

  // Check fouls
  let foul=false;
  if(isOpeningBreak){
    // Opening break rules: at least 2 object balls must hit a cushion
    // Count object balls (not cue ball) that hit a rail
    const objRailCount=[...simRailBalls].filter(id=>id!==0).length;
    if(cueScratch){
      foul=true;foulMsg='Break scratch! Cue ball pocketed.';
      pocketed.delete(0);cueBall.x=25;cueBall.y=25;
    } else if(!simHitBall){
      foul=true;foulMsg='Break: no ball contacted!';
    } else if(objRailCount<2){
      foul=true;foulMsg=`Illegal break! Only ${objRailCount} ball(s) reached a rail (need 2).`;
    }
    if(foul){
      // Opening break foul: -2 points for breaker
      scores[currentPlayer]-=2;
      document.getElementById('foul').textContent='FOUL: '+foulMsg;
      document.getElementById('foul').style.display='block';
      // Opponent decides: accept table or force re-rack
      // AI logic: accept if there's a makeable shot, reject otherwise
      const opponent=1-currentPlayer;
      let opponentHasShot=false;
      for(const b of balls){
        if(pocketed.has(b.id)||b.id>15)continue;
        const bp=bestPocketForBall(b.x,b.y,b.id);
        if(bp){opponentHasShot=true;break;}
      }
      if(opponentHasShot){
        // Opponent accepts the table — plays regular shots
        isOpeningBreak=false;
        currentPlayer=opponent;
        runLength=0;
        document.getElementById('status').textContent=
          `Illegal break. ${pname()} accepts the table. Click "Plan Next".`;
      } else {
        // Opponent rejects — re-rack, same player breaks again
        // Un-pocket any balls pocketed during the break
        for(const pid of objPocketed){pocketed.delete(pid);}
        doRerack();
        // isOpeningBreak stays true — same player must try again
        runLength=0;
        document.getElementById('status').textContent=
          `Illegal break. ${pname()} rejects. Re-rack. Same player breaks again.`;
      }
      currentPlan=null;simBallState={};updateUI();return;
    } else {
      // Legal break — transition to normal play
      isOpeningBreak=false;
      // After legal break, opponent gets the table
      currentPlayer=1-currentPlayer;
      runLength=0;
      document.getElementById('status').textContent=
        `Legal break (${objRailCount} balls reached rail). ${pname()}'s turn. Click "Plan Next".`;
      currentPlan=null;simBallState={};updateUI();return;
    }
  } else {
    // Normal play foul rules
    if(cueScratch){
      foul=true;foulMsg='Scratch! Cue ball pocketed.';
      pocketed.delete(0);cueBall.x=25;cueBall.y=25;
    } else if(!simHitBall){
      foul=true;foulMsg='No ball contacted!';
    } else if(!simHitRail&&objPocketed.length===0){
      foul=true;foulMsg='No rail after contact!';
    }
  }

  if(foul&&!isOpeningBreak){
    // Normal foul: -1 point, switch player
    scores[currentPlayer]-=1;
    consecutiveFouls[currentPlayer]++;
    if(consecutiveFouls[currentPlayer]>=3){scores[currentPlayer]-=15;consecutiveFouls[currentPlayer]=0;foulMsg+=' THREE CONSECUTIVE FOULS! -16 total.';}
    document.getElementById('foul').textContent='FOUL: '+foulMsg;
    document.getElementById('foul').style.display='block';
    currentPlayer=1-currentPlayer;
    runLength=0;
  } else {
    consecutiveFouls[currentPlayer]=0;
    if(objPocketed.length>0){
      scores[currentPlayer]+=objPocketed.length;
      runLength+=objPocketed.length;

      // Check re-rack (1 or fewer balls left)
      let onTable=0;for(const b of balls)if(!pocketed.has(b.id))onTable++;
      if(onTable<=1) doRerack();

      // Check win — don't stop immediately, let the run continue
      if(scores[currentPlayer]>=TARGET_SCORE&&!targetReached){
        targetReached=true; winningPlayer=currentPlayer;
      }
      if(runLength>bestRun)bestRun=runLength;
      const runInfo=targetReached&&currentPlayer===winningPlayer
        ?`\u2605 ${pname()} reached ${TARGET_SCORE}! Run: ${runLength} (best: ${bestRun}). Keep going or "New Game".`
        :`${pname()} pocketed #${objPocketed.join(',')}! Run: ${runLength}. Click "Plan Next".`;
      document.getElementById('status').textContent=runInfo;
    } else {
      // Run ended
      if(targetReached&&currentPlayer===winningPlayer){
        gameOver=true;
        document.getElementById('status').textContent=
          `${pname()} WINS with ${scores[winningPlayer]} pts! Final run: ${runLength} | Best run: ${bestRun}. Click "New Game".`;
        updateUI();return;
      }
      runLength=0;
      currentPlayer=1-currentPlayer;
      if(targetReached){
        // Opponent gets one more turn? No — winner's run just ended, game over.
        gameOver=true;
        const wp=`Player ${winningPlayer+1}`;
        document.getElementById('status').textContent=
          `${wp} WINS with ${scores[winningPlayer]} pts! Best run: ${bestRun}. Click "New Game".`;
        updateUI();return;
      }
      document.getElementById('status').textContent=`No ball pocketed. ${pname()}'s turn. Click "Plan Next".`;
    }
  }
  currentPlan=null;simBallState={};
  updateUI();
}

function doRerack(){
  // Find remaining ball (break ball)
  let remainBall=null;
  for(const b of balls)if(!pocketed.has(b.id)){remainBall=b;break;}
  // Check if break ball is in the rack triangle area — if so, move to head spot
  if(remainBall){
    const rx=remainBall.x,ry=remainBall.y;
    // Rack triangle spans roughly x=73 to x=84, y=19 to y=31
    if(rx>73&&rx<84&&ry>19&&ry<31){
      remainBall.x=25; remainBall.y=25; // head spot
    }
  }
  // Also check if cue ball is in the rack area — move to head spot if so
  if(cueBall.x>73&&cueBall.x<84&&cueBall.y>19&&cueBall.y<31){
    cueBall.x=25; cueBall.y=25;
  }
  // Re-rack all pocketed balls except the remaining one
  const comp=0.998,rs=R*Math.sqrt(3)*comp,D=2*R*comp;
  const positions=[];
  for(let row=0;row<5;row++)for(let col=0;col<=row;col++){
    positions.push([75+row*rs,25+(col-row/2)*D]);}
  const remainId=remainBall?remainBall.id:null;
  let pi=remainId?1:0; // skip apex if re-racking with break ball
  for(const b of balls){
    if(b.id===remainId)continue;
    if(!pocketed.has(b.id))continue;
    if(pi<positions.length){b.x=positions[pi][0];b.y=positions[pi][1];pocketed.delete(b.id);pi++;}
  }
}

function updateUI(){
  document.getElementById('s1').textContent=scores[0];
  document.getElementById('s2').textContent=scores[1];
  document.getElementById('p1').className='player'+(currentPlayer===0?' active':'');
  document.getElementById('p2').className='player'+(currentPlayer===1?' active':'');
  document.getElementById('f1').textContent=consecutiveFouls[0]>0?`(${consecutiveFouls[0]} foul${consecutiveFouls[0]>1?'s':''})`:'';
  document.getElementById('f2').textContent=consecutiveFouls[1]>0?`(${consecutiveFouls[1]} foul${consecutiveFouls[1]>1?'s':''})`:'';
}

function newGame(){
  gameOver=false;targetReached=false;winningPlayer=-1;bestRun=0;isOpeningBreak=true;
  scores=[0,0];currentPlayer=0;consecutiveFouls=[0,0];runLength=0;
  pocketed=new Set();simulating=false;simBallState={};currentPlan=null;
  foulMsg='';document.getElementById('foul').style.display='none';
  cueBall.x=25;cueBall.y=25+Math.random()*10-5;
  // Rack at foot spot
  balls=[];const comp=0.998,rs=R*Math.sqrt(3)*comp,D=2*R*comp;
  const positions=[];
  for(let row=0;row<5;row++)for(let col=0;col<=row;col++){
    positions.push([75+row*rs,25+(col-row/2)*D]);}
  const ids=[...Array(15)].map((_,i)=>i+1);
  for(let i=ids.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ids[i],ids[j]]=[ids[j],ids[i]];}
  for(let i=0;i<15;i++)balls.push({id:ids[i],x:positions[i][0],y:positions[i][1]});
  updateUI();
  document.getElementById('status').textContent=`${pname()}'s break. Click "Plan Next".`;
}

function applyF(b){const sp=Math.sqrt(b.vx**2+b.vy**2);if(sp<VT){b.vx=0;b.vy=0;return;}
  const dv=MU_ROLL*G_*DT_;if(dv>=sp){b.vx=0;b.vy=0;}else{const f=1-dv/sp;b.vx*=f;b.vy*=f;}}
function cush(b){if(b.x<R&&b.vx<0){b.vx=-b.vx*CUSH_R;b.x=R;}if(b.x>TL-R&&b.vx>0){b.vx=-b.vx*CUSH_R;b.x=TL-R;}
  if(b.y<R&&b.vy<0){b.vy=-b.vy*CUSH_R;b.y=R;}if(b.y>TW-R&&b.vy>0){b.vy=-b.vy*CUSH_R;b.y=TW-R;}}
function cushTrack(b){
  let hit=false;
  if(b.x<R&&b.vx<0){b.vx=-b.vx*CUSH_R;b.x=R;hit=true;}
  if(b.x>TL-R&&b.vx>0){b.vx=-b.vx*CUSH_R;b.x=TL-R;hit=true;}
  if(b.y<R&&b.vy<0){b.vy=-b.vy*CUSH_R;b.y=R;hit=true;}
  if(b.y>TW-R&&b.vy>0){b.vy=-b.vy*CUSH_R;b.y=TW-R;hit=true;}
  if(hit&&simHitBall){simHitRail=true;simRailBalls.add(b._trackId);}
}

function draw(){
  const c=document.getElementById('table'),ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle='#3d1f00';ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle='#6b3300';ctx.fillRect(OX*0.3,OY*0.3,c.width-OX*0.6,c.height-OY*0.6);
  ctx.fillStyle='#0e7a2b';ctx.fillRect(OX,OY,TL*S,TW*S);
  for(let p=0;p<6;p++){ctx.beginPath();ctx.arc(tx(POCKETS[p][0]),ty(POCKETS[p][1]),POCKET_R[p]*S,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();}

  // Plan graphics
  if(currentPlan&&!simulating&&!currentPlan.isSafety){
    const pl=currentPlan,b=balls.find(b2=>b2.id===pl.ballId);
    if(b&&!pocketed.has(b.id)){
      ctx.beginPath();ctx.arc(tx(pl.ghost.x),ty(pl.ghost.y),R*S,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);
      const dx=Math.cos(pl.aimAngle),dy=Math.sin(pl.aimAngle);
      ctx.beginPath();ctx.setLineDash([4,6]);ctx.moveTo(tx(cueBall.x),ty(cueBall.y));
      ctx.lineTo(tx(cueBall.x+dx*100),ty(cueBall.y+dy*100));
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
      const pp=PA[pl.pocketIdx],pdx=b.x-pp[0],pdy=b.y-pp[1],pd=Math.sqrt(pdx*pdx+pdy*pdy)||0.001;
      ctx.beginPath();ctx.setLineDash([5,4]);ctx.moveTo(tx(pp[0]),ty(pp[1]));
      ctx.lineTo(tx(b.x+pdx/pd*6*R),ty(b.y+pdy/pd*6*R));
      ctx.strokeStyle='rgba(255,180,0,0.5)';ctx.lineWidth=1.5;ctx.stroke();ctx.setLineDash([]);
      ctx.beginPath();ctx.arc(tx(b.x),ty(b.y),R*S+5,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,100,100,0.7)';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle=currentPlayer===0?'#4af':'#fa4';ctx.font='bold 11px Arial';ctx.textAlign='center';
      ctx.fillText(SPIN_NAMES[pl.spinType],tx(cueBall.x),ty(cueBall.y)+R*S+13);
    }
  }

  // All balls
  for(const b of balls){
    if(pocketed.has(b.id))continue;
    let bx=b.x,by=b.y;
    if(simulating&&simBallState[b.id]){if(simBallState[b.id].pocketed)continue;bx=simBallState[b.id].x;by=simBallState[b.id].y;}
    ctx.beginPath();ctx.arc(tx(bx),ty(by),R*S,0,Math.PI*2);ctx.fillStyle=BALL_COLORS[(b.id-1)%15];ctx.fill();
    const gr=ctx.createRadialGradient(tx(bx)-R*S*0.3,ty(by)-R*S*0.3,R*S*0.1,tx(bx),ty(by),R*S);
    gr.addColorStop(0,'rgba(255,255,255,0.4)');gr.addColorStop(1,'rgba(0,0,0,0.3)');
    ctx.beginPath();ctx.arc(tx(bx),ty(by),R*S,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.round(R*S*0.5)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.id.toString(),tx(bx),ty(by)+0.5);
  }
  // Cue ball
  const cd=simulating&&simBallState[0]?simBallState[0]:cueBall;
  if(!(simulating&&simBallState[0]&&simBallState[0].pocketed)){
    ctx.beginPath();ctx.arc(tx(cd.x),ty(cd.y),R*S,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    const gr2=ctx.createRadialGradient(tx(cd.x)-R*S*0.3,ty(cd.y)-R*S*0.3,R*S*0.1,tx(cd.x),ty(cd.y),R*S);
    gr2.addColorStop(0,'rgba(255,255,255,0.4)');gr2.addColorStop(1,'rgba(0,0,0,0.2)');
    ctx.beginPath();ctx.arc(tx(cd.x),ty(cd.y),R*S,0,Math.PI*2);ctx.fillStyle=gr2;ctx.fill();
  }
}

// Debug: call debugShots() from browser console to see why each ball/pocket is rejected
function debugShots(){
  const PN=['TL','TS','TR','BL','BS','BR'];
  for(const b of balls){
    if(pocketed.has(b.id)||b.id>15)continue;
    console.log(`Ball #${b.id} at (${b.x.toFixed(1)}, ${b.y.toFixed(1)}):`);
    for(let p=0;p<6;p++){
      const px=PA[p][0],py=PA[p][1];
      const appr=pocketApproachOk(b.x,b.y,p);
      if(!appr){console.log(`  ${PN[p]}: REJECTED approach angle`);continue;}
      const tpx=px-b.x,tpy=py-b.y,tpd=Math.sqrt(tpx*tpx+tpy*tpy);
      const tnx=tpx/tpd,tny=tpy/tpd;
      const gx=b.x-tnx*2*R,gy=b.y-tny*2*R;
      const cgd=Math.sqrt((gx-cueBall.x)**2+(gy-cueBall.y)**2);
      const cdot=((gx-cueBall.x)/cgd)*tnx+((gy-cueBall.y)/cgd)*tny;
      const ca=Math.acos(Math.max(-1,Math.min(1,cdot)))*180/Math.PI;
      if(ca>75){console.log(`  ${PN[p]}: REJECTED cut ${ca.toFixed(0)}deg >75`);continue;}
      const cueClear=isPathClear(cueBall.x,cueBall.y,gx,gy,[b.id]);
      if(!cueClear){console.log(`  ${PN[p]}: REJECTED cue path blocked (cut ${ca.toFixed(0)})`);continue;}
      const ballClear=isPathClear(b.x,b.y,px,py,[b.id]);
      if(!ballClear){console.log(`  ${PN[p]}: REJECTED ball path blocked (cut ${ca.toFixed(0)})`);continue;}
      const diff=(ca/75+(cgd+tpd)/(TL*1.5)).toFixed(2);
      console.log(`  ${PN[p]}: OK cut=${ca.toFixed(0)} diff=${diff}`);
    }
  }
  console.log(`Cue ball at (${cueBall.x.toFixed(1)}, ${cueBall.y.toFixed(1)})`);
}
function gameLoop(){if(simulating)for(let i=0;i<10;i++)simStep();draw();requestAnimationFrame(gameLoop);}
document.getElementById('shootBtn').addEventListener('click',shoot);
document.getElementById('nextBtn').addEventListener('click',planShot);
document.getElementById('newBtn').addEventListener('click',newGame);
requestAnimationFrame(gameLoop);
